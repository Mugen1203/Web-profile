<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/db.js" defer></script>
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
        <div class="card-glass" style="max-width: 400px; width: 100%;">
            <h1 style="text-align: center; margin-bottom: 20px;">Admin Login</h1>
            
            <div id="error-container"></div>

            <form id="login-form" style="margin: 0;">
                <div>
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Username" required style="margin-top: 10px;">
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required style="margin-top: 10px;">
                </div>

                <button class="btn" type="submit" style="width: 100%; margin-top: 20px;">
                    Login
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("login-form");
            const errorContainer = document.getElementById("error-container");

            if (form) {
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const username = document.getElementById("username").value;
                    const password = document.getElementById("password").value;

                    if (window.db && window.db.checkLogin(username, password)) {
                        window.location.href = "dashboard.html";
                    } else {
                        errorContainer.innerHTML = `
                            <div class="alert alert-danger" style="margin-bottom: 15px; padding: 10px;">
                                Invalid username or password
                            </div>
                        `;
                    }
                });
            }
        });
    </script>
</body>
</html>
