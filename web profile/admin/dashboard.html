<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        // Client-side authentication check
        if (sessionStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
    <script src="../js/db.js" defer></script>
</head>
<body>

    <main class="container">
        <div class="admin-header card-glass" style="margin-top: 20px;">
            <div>
                <h1>Admin Dashboard</h1>
                <p style="color: var(--text-secondary);">Manage your portfolio content and messages.</p>
            </div>
            <div class="admin-actions">
                <a href="../main/index.html" class="btn btn-secondary" target="_blank">View Site</a>
                <a href="logout.html" class="btn btn-danger">Logout</a>
            </div>
        </div>

        <div class="stats-grid" style="margin-top: 30px;">
            <div class="stat-card card-glass">
                <h3>Projects</h3>
                <div class="stat-number" id="projects-count">0</div>
                <a href="project-list.html" style="color: var(--accent-cyan); text-decoration: none; font-size: 0.9rem; margin-top: 10px; display: inline-block;">Manage Projects &rarr;</a>
            </div>
            <div class="stat-card card-glass">
                <h3>Contact Messages</h3>
                <div class="stat-number" id="contacts-count">0</div>
                <a href="contact-list.html" style="color: var(--accent-cyan); text-decoration: none; font-size: 0.9rem; margin-top: 10px; display: inline-block;">View Messages &rarr;</a>
            </div>
        </div>

        <div class="admin-section card-glass">
            <h2>Quick Administration</h2>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px;">
                <a href="project-add.html" class="btn">Add Project</a>
                <a href="upload-avatar.html" class="btn btn-secondary">Upload Avatar</a>
                <a href="upload-cv.html" class="btn btn-secondary">Upload CV</a>
                <a href="skill-add.html" class="btn btn-secondary">Add Skill (Page)</a>
            </div>
        </div>

        <div class="admin-section card-glass">
            <h2>Skill Management</h2>
            
            <form id="skill-add-form" style="display: flex; flex-direction: row; gap: 15px; max-width: 100%; margin: 20px 0; align-items: flex-end;">
                <div style="flex: 2;">
                    <label for="skill_name">Skill Name</label>
                    <input type="text" id="skill_name" placeholder="e.g. Docker" required style="margin-top: 8px;">
                </div>
                <div style="flex: 1;">
                    <label for="level">Level (%)</label>
                    <input type="number" id="level" min="1" max="100" placeholder="e.g. 85" required style="margin-top: 8px;">
                </div>
                <button class="btn" type="submit" style="height: 50px;">Add Skill</button>
            </form>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Skill</th>
                            <th>Proficiency</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="skills-table-body">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Wait slightly for db.js to load
            setTimeout(() => {
                refreshData();

                // Handle Inline Skill Add
                const skillForm = document.getElementById("skill-add-form");
                if (skillForm) {
                    skillForm.addEventListener("submit", (e) => {
                        e.preventDefault();
                        const name = document.getElementById("skill_name").value.trim();
                        const level = document.getElementById("level").value;
                        
                        if (window.db) {
                            window.db.addSkill(name, level);
                            skillForm.reset();
                            refreshData();
                        }
                    });
                }
            }, 50);
        });

        function refreshData() {
            if (!window.db) return;

            // Load counts
            const stats = window.db.getStats();
            document.getElementById("projects-count").innerText = stats.projectsCount;
            document.getElementById("contacts-count").innerText = stats.contactsCount;

            // Load skills table
            const skills = window.db.getSkills();
            const tbody = document.getElementById("skills-table-body");
            if (skills.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-secondary);">No skills added yet.</td></tr>';
            } else {
                tbody.innerHTML = skills.map(skill => `
                    <tr>
                        <td style="font-weight: 500;">${skill.skill_name}</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <div class="progress-bar" style="margin-bottom: 0; flex: 1; max-width: 200px;">
                                    <div class="progress-fill" style="width: ${skill.level_percent}%;"></div>
                                </div>
                                <span>${skill.level_percent}%</span>
                            </div>
                        </td>
                        <td style="text-align: right;">
                            <button class="btn btn-danger" onclick="deleteSkill(${skill.id})" style="padding: 6px 12px; font-size: 0.8rem; box-shadow: none;">
                                Delete
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function deleteSkill(id) {
            if (confirm("Are you sure you want to delete this skill?")) {
                if (window.db) {
                    window.db.deleteSkill(id);
                    refreshData();
                }
            }
        }
    </script>
</body>
</html>
