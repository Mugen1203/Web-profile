<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Projects</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/db.js" defer></script>
    <script src="../js/components.js" defer></script>
</head>
<body>

    <!-- Dynamic Header -->
    <div id="navbar-placeholder"></div>

    <main class="container">
        <h1 style="margin-top: 20px;">Projects</h1>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">Các dự án cá nhân và sản phẩm nghiên cứu nổi bật.</p>
        
        <div class="projects-grid" id="projects-container">
            <!-- Loaded dynamically via JS -->
        </div>
    </main>

    <!-- Dynamic Footer -->
    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Wait slightly for db.js to load
            setTimeout(() => {
                const projectsContainer = document.getElementById("projects-container");
                if (projectsContainer && window.db) {
                    const projects = window.db.getProjects();
                    if (projects.length === 0) {
                        projectsContainer.innerHTML = '<p style="color: var(--text-secondary); grid-column: 1/-1;">No projects listed yet.</p>';
                    } else {
                        projectsContainer.innerHTML = projects.map(project => {
                            const techTags = project.technologies 
                                ? project.technologies.split(',').map(t => `<span class="tech-tag">${t.trim()}</span>`).join('')
                                : '';
                            const githubBtn = project.github_link
                                ? `<a href="${project.github_link}" class="btn project-btn" target="_blank">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="margin-right: 2px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/></svg>
                                    GitHub
                                   </a>`
                                : '';
                            
                            return `
                                <div class="project-card card-glass">
                                    <div class="project-icon-wrapper">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                                    </div>
                                    <h2>${project.project_name}</h2>
                                    <p>${project.description}</p>
                                    <div class="project-tech">
                                        ${techTags}
                                    </div>
                                    ${githubBtn}
                                </div>
                            `;
                        }).join('');
                    }
                }
            }, 50);
        });
    </script>
</body>
</html>
