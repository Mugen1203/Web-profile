<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Contact</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/db.js" defer></script>
    <script src="../js/components.js" defer></script>
</head>
<body>

    <!-- Dynamic Header -->
    <div id="navbar-placeholder"></div>

    <main class="container">
        <div class="card-glass" style="margin-top: 20px; max-width: 600px; margin-left: auto; margin-right: auto;">
            <h1>Contact Me</h1>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">Hãy gửi tin nhắn cho tôi nếu bạn có bất kỳ câu hỏi hay cơ hội hợp tác nào.</p>
            
            <div id="alert-container"></div>

            <form id="contact-form">
                <div>
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required style="margin-top: 10px;">
                </div>

                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required style="margin-top: 10px;">
                </div>

                <div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="Your message..." required style="margin-top: 10px; resize: vertical;"></textarea>
                </div>

                <button class="btn" type="submit" style="width: 100%; margin-top: 10px;">
                    Send Message
                </button>
            </form>
        </div>
    </main>

    <!-- Dynamic Footer -->
    <div id="footer-placeholder"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("contact-form");
            const alertContainer = document.getElementById("alert-container");

            if (form) {
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    
                    const name = document.getElementById("name").value.trim();
                    const email = document.getElementById("email").value.trim();
                    const message = document.getElementById("message").value.trim();

                    if (window.db) {
                        window.db.addContact(name, email, message);
                        
                        // Show success alert
                        alertContainer.innerHTML = `
                            <div class="alert alert-success">
                                Message Sent successfully! Thank you for reaching out.
                            </div>
                        `;
                        
                        // Reset form
                        form.reset();

                        // Auto-hide alert after 5 seconds
                        setTimeout(() => {
                            alertContainer.innerHTML = '';
                        }, 5000);
                    } else {
                        alertContainer.innerHTML = `
                            <div class="alert alert-danger">
                                Error saving message. Database layer is missing.
                            </div>
                        `;
                    }
                });
            }
        });
    </script>
</body>
</html>
